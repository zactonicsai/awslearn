[defaults]
inventory           = inventory.aws_ec2.yml
host_key_checking   = False
interpreter_python  = /usr/bin/python3
stdout_callback     = yaml
timeout             = 120
retry_files_enabled = False

# The SSM connection plugin is slower per-task than SSH (every module
# round-trips through S3). Bump forks so hosts run in parallel.
forks = 10

[inventory]
enable_plugins = aws_ec2

# ==================================================================
# THE SSM CONNECTION PLUGIN
#
# This is what replaces SSH entirely.
#
# HOW IT WORKS:
#   1. Ansible calls ssm:StartSession against the target instance ID
#   2. AWS opens a WebSocket to the SSM Agent already running on the box
#   3. Ansible needs to get its Python module onto the host. Over SSH
#      it would SFTP it. Over SSM there is no file channel -- so:
#        a. Ansible PUTs the module into the S3 transfer bucket
#        b. Ansible tells the host (over the SSM command channel):
#           "curl this presigned URL and run it"
#        c. The host downloads it from S3 and executes it
#        d. stdout comes back over the SSM channel
#
# That S3 bucket is why an SSM-only Ansible setup needs one and an
# SSH setup does not. It's the cost of having zero open ports.
#
# REQUIRED: set bucket_name, or export ANSIBLE_AWS_SSM_BUCKET.
#   export ANSIBLE_AWS_SSM_BUCKET=$(terraform -chdir=../terraform \
#     output -raw ssm_transfer_bucket)
# ==================================================================
[connection]
pipelining = False
# ^ MUST be False for aws_ssm. Pipelining is an SSH optimization
#   and it will break the SSM plugin. Do not enable it here.
